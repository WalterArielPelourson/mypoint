{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fas fa-coins text-warning"></i> Nuevo Pago Anticipado</h4>
            <span class="badge bg-secondary">Registro Manual de Saldo</span>
        </div>
        <div class="card-body bg-light">
            <form action="{{ url_for('pago_anticipado_cliente') }}" method="POST">
                
                <div class="row">
                    <!-- RUBRO / IMPUTACIÓN -->
                    <div class="col-md-12 mb-4">
                        <label class="form-label fw-bold text-primary">¿A qué cuenta se aplica este dinero?</label>
                        <div class="d-flex gap-3">
                            <div class="flex-fill">
                                <input type="radio" class="btn-check" name="imputacion" id="imp_equipos" value="EQUIPOS" checked>
                                <label class="btn btn-outline-primary w-100 py-3" for="imp_equipos">
                                    <i class="fas fa-mobile-alt fa-2x mb-2"></i><br>
                                    <strong>EQUIPOS / CELULARES</strong><br>
                                    <small>(Cuenta en Dólares)</small>
                                </label>
                            </div>
                            <div class="flex-fill">
                                <input type="radio" class="btn-check" name="imputacion" id="imp_servicios" value="REPARACIONES">
                                <label class="btn btn-outline-info w-100 py-3" for="imp_servicios">
                                    <i class="fas fa-tools fa-2x mb-2"></i><br>
                                    <strong>REPARACIONES / ACCESORIOS</strong><br>
                                    <small>(Cuenta en Pesos)</small>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Cliente -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Cliente</label>
                        <select name="cliente_id" class="form-control select2" required>
                            <option value="">Seleccionar cliente...</option>
                            {% for c in clientes %}
                            <option value="{{ c.id }}">{{ c.razon_social or (c.nombre ~ ' ' ~ c.apellido) }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Medio de Pago -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Medio de Cobro</label>
                        <select name="cuenta_destino" class="form-select" required>
                            <option value="EFECTIVO">💰 EFECTIVO (Caja Física)</option>
                            {% for cuenta in cuentas_entidades %}
                            <option value="{{ cuenta.nombre }}">💳 {{ cuenta.nombre }} ({{ cuenta.titular }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <hr>

                <div class="row align-items-end">
                    <!-- Monto -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Monto que entrega el cliente</label>
                        <div class="input-group input-group-lg">
                            <input type="number" step="0.01" name="monto" class="form-control border-primary" placeholder="0.00" required>
                            <select name="moneda" class="form-select bg-primary text-white" style="max-width: 100px;">
                                <option value="ARS">ARS</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>

                    <!-- Cotización -->
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold text-muted">Cotización para el historial (Dólar hoy)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <input class="form-check-input" type="radio" name="tipo_dolar" value="blue" checked> <small class="ms-1">Blue: ${{ valor_blue_compra }}</small>
                            </span>
                            <span class="input-group-text bg-white">
                                <input class="form-check-input" type="radio" name="tipo_dolar" value="oficial"> <small class="ms-1">Oficial: ${{ valor_bcra_compra }}</small>
                            </span>
                            <input type="number" step="0.01" name="valor_dolar_manual" class="form-control" placeholder="Valor Manual">
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Concepto / Referencia</label>
                    <input type="text" name="observaciones" class="form-control" placeholder="Ej: Seña para traer repuesto de iPhone X o reserva de equipo">
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('listar_clientes_cc') }}" class="text-decoration-none text-muted"><i class="fas fa-arrow-left"></i> Volver a Cuentas Corrientes</a>
                    <button type="submit" class="btn btn-primary btn-lg px-5 shadow">
                        <i class="fas fa-save"></i> Registrar Anticipo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
