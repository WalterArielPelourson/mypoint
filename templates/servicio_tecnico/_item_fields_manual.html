{# Este fragmento es para añadir ítems manualmente #}
{# Los marcadores de posición '__index__' serán reemplazados por JavaScript. #}
<div class="item-row item-manual-row mb-3 p-3 border rounded bg-light position-relative" data-item-type="manual">
    <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 m-2 remove-item" title="Eliminar ítem">
        <i class="bi bi-trash"></i>
    </button>
    
    <div class="row g-2 align-items-end w-100">
        <div class="col-md-6">
            <label for="manual_item_nombre___index__" class="form-label item-label">Nombre/Descripción <span class="text-danger">*</span>:</label>
            <input type="text" class="form-control manual-item-nombre" 
                   id="manual_item_nombre___index__" 
                   name="manual_item_nombre[]" 
                   placeholder="Nombre/Descripción" required>
        </div>

        <div class="col-md-3">
            <label for="item_cantidad_manual___index__" class="form-label item-label">Cantidad <span class="text-danger">*</span>:</label>
            <input type="number" class="form-control item-cantidad-manual" 
                   id="item_cantidad_manual___index__" 
                   name="cantidad_manual[]" 
                   placeholder="Cant." min="1" 
                   value="1" required>
        </div>

        <div class="col-md-3">
            {# ## MODIFICACIÓN ##: Etiqueta, clase y nombre del input para reflejar "Precio Venta (USD)" #}
            <label for="item_precio_venta_usd_manual___index__" class="form-label item-label">Precio Venta (USD) <span class="text-danger">*</span>:</label>
            <input type="number" step="0.01" min="0" class="form-control item-precio-venta-usd-manual" 
                   id="item_precio_venta_usd_manual___index__" 
                   name="precio_venta_usd_manual[]" {# Cambiado de costo_usd_manual[] #}
                   placeholder="Precio Venta USD" 
                   value="0.00" required>
        </div>
    </div>
    <div class="invalid-feedback item-overall-feedback mt-2"></div>
</div>
