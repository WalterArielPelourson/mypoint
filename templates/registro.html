{% extends 'layout.html' %}

{% block title %}Registrar Usuario - {{ super() }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg p-4 mb-5 bg-body rounded">
            <div class="card-body">
                <h2 class="card-title text-center mb-4"><i class="bi bi-person-add me-2"></i>Registrar Nuevo Usuario</h2>
                <form method="POST" action="{{ url_for('registro') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="bi bi-person me-2"></i>Nombre de Usuario:</label>
                        <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="bi bi-lock me-2"></i>Contraseña:</label>
                        <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-person-plus-fill me-2"></i>Registrarse</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0">¿Ya tienes una cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
