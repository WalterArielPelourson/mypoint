{% extends 'layout.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Compra #{{ compra.id }}</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Proveedor</label>
                        <select name="proveedor_id" class="form-select" required>
                            {% for p in proveedores %}
                            <option value="{{ p.id }}" {% if p.id == compra.proveedor_id %}selected{% endif %}>
                                {{ p.razon_social or (p.nombre + ' ' + p.apellido) }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Cantidad</label>
                        <input type="number" name="cantidad" class="form-control" value="{{ compra.cantidad }}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Costo Unitario USD</label>
                        <input type="number" step="0.01" name="costo_unitario_usd" class="form-control" value="{{ compra.costo_unitario_usd }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Cotización Dólar (Dólar Momento)</label>
                        <input type="number" step="0.01" name="valor_dolar_momento" class="form-control" value="{{ compra.valor_dolar_momento }}" required>
                    </div>
                    <div class="col-12 mt-4">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle me-2"></i>
                            Al modificar el costo o la cantidad, se actualizará automáticamente el saldo en la Cuenta Corriente del proveedor y el stock disponible.
                        </div>
                    </div>
                    <div class="col-12 text-end">
                        <a href="{{ url_for('listar_compras') }}" class="btn btn-secondary text-white">Cancelar</a>
                        <button type="submit" class="btn btn-warning">Guardar Cambios</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
