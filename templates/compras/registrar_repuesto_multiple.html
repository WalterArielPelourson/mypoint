{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <form action="{{ url_for('registrar_compra_repuesto') }}" method="POST">
        <div class="card shadow border-0 mb-4">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-cart-plus me-2"></i>Registrar Compra de Insumos (Carga Múltiple)</h4>
            </div>
            <div class="card-body bg-light">
                <!-- CABECERA: Proveedor y Dólar -->
                <div class="row g-3 mb-4 p-3 border rounded bg-white">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Proveedor</label>
                        <select name="proveedor_id" class="form-select select2" required>
                            <option value="">Seleccionar proveedor...</option>
                            {% for p in proveedores %}
                            <option value="{{ p.id }}">{{ p.razon_social or (p.nombre ~ ' ' ~ p.apellido) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Moneda Compra</label>
                        <select name="moneda_compra" id="moneda_compra" class="form-select bg-primary text-white">
                            <option value="USD">USD</option>
                            <option value="ARS">ARS</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Cotización Dólar</label>
                        <select name="tipo_dolar" id="tipo_dolar" class="form-select" onchange="toggleManual()">
                            <option value="blue">Blue: ${{ valor_blue_compra }}</option>
                            <option value="manual">Manual</option>
                        </select>
                    </div>
                    <div class="col-md-3" id="div_manual" style="display:none;">
                        <label class="form-label fw-bold text-danger">Valor Manual</label>
                        <input type="number" step="0.01" name="valor_dolar_manual" id="val_manual" class="form-control border-danger">
                    </div>
                </div>

                <!-- TABLA DINÁMICA -->
                <div class="table-responsive">
                    <table class="table table-bordered bg-white shadow-sm" id="tabla_items">
                        <thead class="table-secondary">
                            <tr>
                                <th>Nombre del Repuesto / Accesorio</th>
                                <th>Categoría</th>
                                <th>Modelo Compatible</th>
                                <th style="width: 100px;">Cant.</th>
                                <th style="width: 150px;">Costo Unit.</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Las filas se agregan con JS -->
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn btn-outline-primary" onclick="agregarFila()">
                    <i class="bi bi-plus-circle me-1"></i>Añadir otro producto
                </button>
            </div>
        </div>

        <!-- SECCIÓN DE PAGO (Solo si no es técnico) -->
        {% if current_user.role != 'tecnico' %}
        <div class="card shadow border-0 mb-4">
            <div class="card-body">
                <h5 class="border-bottom pb-2"><i class="bi bi-cash-coin me-2"></i>Pago Inicial (Opcional)</h5>
                <div class="row g-3 mt-1">
                    <div class="col-md-3">
                        <label class="form-label">Monto Pesos (ARS)</label>
                        <input type="number" step="0.01" name="monto_pago_inicial_ars" class="form-control" placeholder="0.00">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cuenta ARS</label>
                        <select name="cuenta_pago_ars" class="form-select">
                            <option value="EFECTIVO">Caja Efectivo</option>
                            {% for c in cuentas_entidades %}<option value="{{c.nombre}}">{{c.nombre}}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Monto Dólares (USD)</label>
                        <input type="number" step="0.01" name="monto_pago_inicial_usd" class="form-control" placeholder="0.00">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Cuenta USD</label>
                        <select name="cuenta_origen_usd_inicial" class="form-select">
                            <option value="EFECTIVO">Caja Efectivo USD</option>
                            {% for c in cuentas_entidades %}<option value="{{c.nombre}}">{{c.nombre}}</option>{% endfor %}
                        </select>
                    </div>
                </div>
            </div>
        </div>
        {% endif %}

        <div class="d-flex justify-content-end gap-3 mb-5">
            <a href="{{ url_for('listar_compras') }}" class="btn btn-secondary btn-lg">Cancelar</a>
            <button type="submit" class="btn btn-success btn-lg px-5 shadow">
                <i class="bi bi-check-lg me-2"></i>REGISTRAR COMPRA TOTAL
            </button>
        </div>
    </form>
</div>

<script>
function agregarFila() {
    const tbody = document.querySelector('#tabla_items tbody');
    const fila = document.createElement('tr');
    fila.innerHTML = `
        <td><input type="text" name="nombre_parte[]" class="form-control" required placeholder="Ej: PIN DE CARGA"></td>
        <td>
            <select name="categoria[]" class="form-select">
                <option value="REPUESTO">REPUESTO</option>
                <option value="ACCESORIO">ACCESORIO</option>
                <option value="PRODUCTO">PRODUCTO</option>
                <option value="HERRAMIENTA">HERRAMIENTA</option>
            </select>
        </td>
        <td><input type="text" name="modelo_compatible[]" class="form-control" placeholder="Ej: Samsung A10"></td>
        <td><input type="number" name="stock[]" class="form-control" value="1" min="1" required></td>
        <td><input type="number" step="0.01" name="costo_unidad[]" class="form-control" required placeholder="0.00"></td>
        <td class="text-center"><button type="button" class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
    `;
    tbody.appendChild(fila);
}

function toggleManual() {
    document.getElementById('div_manual').style.display = (document.getElementById('tipo_dolar').value === 'manual') ? 'block' : 'none';
}

// Agregar la primera fila al cargar
window.onload = agregarFila;
</script>
{% endblock %}
