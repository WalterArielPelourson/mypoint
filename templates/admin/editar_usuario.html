{% extends 'layout.html' %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" value="{{ usuario.username }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Rol / Nivel</label>
                            <select name="role" class="form-select">
                                <option value="tecnico" {% if usuario.role == 'tecnico' %}selected{% endif %}>Técnico</option>
                                <option value="usuario" {% if usuario.role == 'usuario' %}selected{% endif %}>Usuario Estándar</option>
                                <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>Administrador</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cambiar Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="Dejar vacío para no cambiar">
                            <small class="text-muted">Solo complete este campo si desea establecer una nueva clave.</small>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('gestionar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
