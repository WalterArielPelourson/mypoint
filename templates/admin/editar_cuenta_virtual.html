{% extends 'layout.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Entidad de Pago</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de la Entidad</label>
                            <input type="text" name="nombre" class="form-control" value="{{ cuenta.nombre }}" required style="text-transform:uppercase;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Titular</label>
                            <input type="text" name="titular" class="form-control" value="{{ cuenta.titular }}" required>
                        </div>
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="activo" id="activo" {% if cuenta.activo == 1 %}checked{% endif %}>
                                <label class="form-check-label" for="activo">Cuenta Activa</label>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('gestionar_cuentas_virtuales') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
